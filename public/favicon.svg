<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- White circle background -->
  <circle cx="16" cy="16" r="16" fill="#ffffff"/>
  <!-- Globe outline -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="#1a1a2e" stroke-width="1.8"/>
  <!-- Horizontal equator line -->
  <ellipse cx="16" cy="16" rx="5" ry="9" fill="none" stroke="#1a1a2e" stroke-width="1.8"/>
  <!-- Top and bottom horizontal lines -->
  <line x1="7.5" y1="12" x2="24.5" y2="12" stroke="#1a1a2e" stroke-width="1.8"/>
  <line x1="7.5" y1="20" x2="24.5" y2="20" stroke="#1a1a2e" stroke-width="1.8"/>
</svg>
