[build]
  command = "npm run build"
  publish = "dist/api-buddy-cloud/browser"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes served by index.html so Angular Router works
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# HTTP Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking — disallow embedding in iframes
    X-Frame-Options = "DENY"

    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Limit referrer info sent to third parties
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Restrict access to browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"

    # Force HTTPS for 1 year (including subdomains)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Content Security Policy
    # - default-src: fallback — only allow same origin
    # - script-src: allow self + inline scripts Angular needs
    # - style-src: allow self + Google Fonts + inline styles (Angular)
    # - font-src: allow Google Fonts
    # - img-src: allow self, data URIs, and any HTTPS source (for OAuth avatars)
    # - connect-src: allow self + Supabase API
    # - frame-ancestors: block all iframes (mirrors X-Frame-Options)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

# Cache hashed JS/CSS bundles for 1 year (they have content hash in filename)
[[headers]]
  for = "/browser/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/browser/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache fonts and images for 1 year
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache index.html or env.js — always serve fresh
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/env.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Sitemap and robots.txt — short cache so updates propagate quickly
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "text/plain; charset=utf-8"

# Manifest
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/manifest+json"
