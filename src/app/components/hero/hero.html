<section class="hero-section">
  <div class="grid-bg"></div>
  <div class="glow-bg"></div>
  <div class="container hero-container">
    <div class="hero-content">
      <div class="badge">
        <span class="badge-dot"></span>
        Now in public beta
      </div>

      <h1 class="hero-title">
        Mock APIs in <span class="text-gradient">seconds</span>,<br />not hours
      </h1>

      <p class="hero-description">
        Generate instant mock endpoints with custom JSON responses. Stop waiting for the backend —
        start building now.
      </p>

      <div class="hero-actions">
        <button class="btn btn-primary" (click)="goToDashboard()">
          Start Mocking
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M5 12h14" />
            <path d="m12 5 7 7-7 7" />
          </svg>
        </button>
        <a href="#how-it-works" class="btn btn-outline">See how it works</a>
      </div>
    </div>

    <div class="code-preview">
      <div class="code-header">
        <div class="code-dots">
          <span class="dot dot-red"></span>
          <span class="dot dot-yellow"></span>
          <span class="dot dot-green"></span>
        </div>
        <button
          class="copy-btn"
          (click)="copyCode()"
          [class.copy-btn-success]="copied"
          title="Copy code"
        >
          <ng-container *ngIf="!copied">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
              <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
            </svg>
          </ng-container>
          <ng-container *ngIf="copied">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 6 9 17l-5-5" />
            </svg>
            <span class="copy-label">Copied!</span>
          </ng-container>
        </button>
      </div>
      <pre
        class="code-body"
      ><code><span class="code-fn">fetch</span><span class="code-text">(</span><span class="code-str">"https://mockapi.store/api/v1/users"</span><span class="code-text">)</span>
  <span class="code-muted">.then</span><span class="code-text">(</span><span class="code-var">res</span><span class="code-muted"> =&gt; </span><span class="code-var">res</span><span class="code-text">.</span><span class="code-fn">json</span><span class="code-text">())</span>
  <span class="code-muted">.then</span><span class="code-text">(</span><span class="code-var">data</span><span class="code-muted"> =&gt; </span><span class="code-text">console.</span><span class="code-fn">log</span><span class="code-text">(</span><span class="code-var">data</span><span class="code-text">))</span></code></pre>
    </div>
  </div>
</section>
