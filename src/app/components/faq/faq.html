<section id="faq" class="faq-section">
  <div class="container">
    <div class="section-header">
      <h2>Frequently asked <span class="text-gradient">questions</span></h2>
      <p>Everything you need to know about MockAPI.</p>
    </div>

    <div class="faq-list">
      <div
        class="faq-item"
        *ngFor="let faq of faqs; let i = index"
        [class.faq-open]="faq.open"
      >
        <button
          class="faq-question"
          (click)="toggle(i)"
          [attr.aria-expanded]="faq.open"
          [attr.aria-controls]="'faq-answer-' + i"
        >
          <span>{{ faq.question }}</span>
          <svg
            class="faq-chevron"
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="m6 9 6 6 6-6" />
          </svg>
        </button>
        <div
          class="faq-answer"
          [id]="'faq-answer-' + i"
          [attr.aria-hidden]="!faq.open"
        >
          <p>{{ faq.answer }}</p>
        </div>
      </div>
    </div>
  </div>
</section>
