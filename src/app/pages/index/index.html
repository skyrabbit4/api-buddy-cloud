<div class="landing-page">
  <div class="payment-success-bar" *ngIf="showPaymentSuccess">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4 12 14.01l-3-3"/></svg>
    <span>You're now on the <strong>Pro plan</strong> — enjoy unlimited endpoints and 100k requests/month!</span>
    <button (click)="dismissPaymentSuccess()" aria-label="Dismiss">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </div>
  <header>
    <app-navbar></app-navbar>
  </header>
  <main>
    <app-hero></app-hero>
    <app-features></app-features>
    <app-how-it-works></app-how-it-works>
    <app-pricing></app-pricing>
    <app-faq></app-faq>
  </main>
  <footer>
    <app-footer></app-footer>
  </footer>

  <!-- Scroll to top -->
  <button
    class="scroll-top-btn"
    *ngIf="showScrollTop"
    (click)="scrollToTop()"
    aria-label="Scroll to top">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
  </button>
</div>
