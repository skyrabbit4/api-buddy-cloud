    <!-- JSON-LD: FAQPage (rich snippets in Google) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is MockAPI?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "MockAPI is a free online tool that lets you create mock HTTP endpoints instantly. You can define custom JSON responses, HTTP status codes, response delays, and supported methods (GET, POST, PUT, PATCH, DELETE) — all without writing any backend code."
            }
          },
          {
            "@type": "Question",
            "name": "Is MockAPI free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. MockAPI has a free plan that includes 5 mock endpoints and 1,000 requests per month — forever. A Pro plan is available at $12/month for unlimited endpoints and 100,000 requests/month."
            }
          },
          {
            "@type": "Question",
            "name": "How do I create a mock API endpoint?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sign in with Google or GitHub, click 'New Endpoint' on your dashboard, fill in the HTTP method, path, status code, optional delay, and JSON response body — your live endpoint URL is generated instantly."
            }
          },
          {
            "@type": "Question",
            "name": "What HTTP methods does MockAPI support?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "MockAPI supports GET, POST, PUT, PATCH, and DELETE — the full range of REST API methods you need for realistic frontend mocking."
            }
          },
          {
            "@type": "Question",
            "name": "Does MockAPI support CORS?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. All MockAPI endpoints include proper CORS headers so you can call them from any frontend origin — including localhost — without any additional configuration."
            }
          },
          {
            "@type": "Question",
            "name": "Can I simulate slow API responses?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. When creating or editing an endpoint, you can set a delay in milliseconds. This lets you test loading states, spinners, and timeout handling in your frontend."
            }
          }
        ]
      }
    </script>
